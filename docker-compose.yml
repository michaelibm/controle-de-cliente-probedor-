services:

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: isp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-isp_manager}
      POSTGRES_USER: ${POSTGRES_USER:-isp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-isp_pass_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-isp_user} -d ${POSTGRES_DB:-isp_manager}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - isp_network

  # ── Backend NestJS ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: isp_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-isp_user}:${POSTGRES_PASSWORD:-isp_pass_2024}@postgres:5432/${POSTGRES_DB:-isp_manager}
      JWT_SECRET: ${JWT_SECRET:-isp-jwt-secret-troque-em-producao-2024}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-isp-refresh-secret-troque-em-producao-2024}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:80}
      RUN_SEED: ${RUN_SEED:-true}
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://sandbox.asaas.com/api/v3}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-isp-asaas-webhook-seguro-2024-xk9m}
      WEBHOOK_URL: ${WEBHOOK_URL}
      WEBHOOK_URL_NOTIFICATIONS: ${WEBHOOK_URL_NOTIFICATIONS}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    networks:
      - isp_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Frontend React + Nginx ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: isp_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - isp_network

volumes:
  postgres_data:
    name: isp_postgres_data

networks:
  isp_network:
    name: isp_network
    driver: bridge
