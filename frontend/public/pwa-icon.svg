<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Anel externo metálico -->
    <linearGradient id="ring" x1="30%" y1="20%" x2="80%" y2="85%">
      <stop offset="0%"  stop-color="#E0E2E5"/>
      <stop offset="40%" stop-color="#B8BCC4"/>
      <stop offset="70%" stop-color="#9AA0AB"/>
      <stop offset="100%" stop-color="#C8CBD2"/>
    </linearGradient>
    <!-- Fundo interno metálico -->
    <radialGradient id="metal" cx="38%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#4E4E4E"/>
      <stop offset="45%"  stop-color="#242424"/>
      <stop offset="100%" stop-color="#0E0E0E"/>
    </radialGradient>
    <!-- Brilho superior -->
    <radialGradient id="shine" cx="50%" cy="10%" r="55%">
      <stop offset="0%"  stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Glow verde NFT -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sombra externa -->
  <circle cx="260" cy="262" r="248" fill="rgba(0,0,0,0.18)"/>
  <!-- Anel externo prata -->
  <circle cx="256" cy="256" r="252" fill="url(#ring)"/>
  <!-- Borda escura interna do anel -->
  <circle cx="256" cy="256" r="228" fill="#1A1A1A"/>
  <!-- Disco metálico principal -->
  <circle cx="256" cy="256" r="222" fill="url(#metal)"/>
  <!-- Brilho superior -->
  <circle cx="256" cy="256" r="222" fill="url(#shine)"/>

  <!-- Linhas de circuito -->
  <g stroke="#22E55C" stroke-width="1.2" opacity="0.28" fill="none">
    <polyline points="55,195 140,195 165,170"/>
    <polyline points="455,195 370,195 345,170"/>
    <polyline points="55,315 140,315 165,340"/>
    <polyline points="455,315 370,315 345,340"/>
    <line x1="165" y1="170" x2="195" y2="170"/>
    <line x1="315" y1="170" x2="345" y2="170"/>
  </g>
  <g fill="#22E55C" opacity="0.55">
    <circle cx="140" cy="195" r="4.5"/>
    <circle cx="370" cy="195" r="4.5"/>
    <circle cx="140" cy="315" r="4.5"/>
    <circle cx="370" cy="315" r="4.5"/>
    <circle cx="195" cy="170" r="3"/>
    <circle cx="315" cy="170" r="3"/>
  </g>

  <!-- Texto NFT — camada glow -->
  <text x="256" y="272"
    font-family="'Arial Black',Impact,Arial,sans-serif"
    font-size="168" font-weight="900" font-style="italic"
    fill="rgba(34,229,92,0.30)" text-anchor="middle"
    letter-spacing="-3">NFT</text>
  <!-- Texto NFT — principal -->
  <text x="256" y="268"
    font-family="'Arial Black',Impact,Arial,sans-serif"
    font-size="168" font-weight="900" font-style="italic"
    fill="#22E55C" text-anchor="middle"
    letter-spacing="-3"
    filter="url(#glow)">NFT</text>

  <!-- Linha separadora -->
  <line x1="140" y1="292" x2="372" y2="292" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- TELECOM -->
  <text x="256" y="335"
    font-family="'Arial','Helvetica Neue',sans-serif"
    font-size="44" font-weight="700"
    fill="#FFFFFF" text-anchor="middle"
    letter-spacing="7" opacity="0.92">TELECOM</text>
</svg>
