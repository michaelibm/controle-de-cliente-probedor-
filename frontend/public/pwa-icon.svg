<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="252" fill="#CCCDCF"/>
  <circle cx="256" cy="256" r="244" fill="#3A3A3A"/>
  <!-- Metallic inner -->
  <radialGradient id="metal" cx="40%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#4A4A4A"/>
    <stop offset="60%" stop-color="#1E1E1E"/>
    <stop offset="100%" stop-color="#111111"/>
  </radialGradient>
  <circle cx="256" cy="256" r="220" fill="url(#metal)"/>
  <!-- Circuit lines -->
  <g stroke="#22E55C" stroke-width="0.8" opacity="0.18">
    <line x1="80" y1="180" x2="180" y2="180"/>
    <line x1="180" y1="180" x2="210" y2="150"/>
    <line x1="330" y1="180" x2="430" y2="180"/>
    <line x1="330" y1="180" x2="300" y2="150"/>
    <line x1="80" y1="320" x2="160" y2="320"/>
    <line x1="160" y1="320" x2="190" y2="350"/>
    <line x1="350" y1="320" x2="430" y2="320"/>
    <line x1="350" y1="320" x2="320" y2="350"/>
    <circle cx="180" cy="180" r="4" fill="#22E55C" opacity="0.5"/>
    <circle cx="330" cy="180" r="4" fill="#22E55C" opacity="0.5"/>
    <circle cx="160" cy="320" r="4" fill="#22E55C" opacity="0.5"/>
    <circle cx="350" cy="320" r="4" fill="#22E55C" opacity="0.5"/>
  </g>
  <!-- NFT text glow -->
  <text x="256" y="278"
    font-family="'Arial Black',Impact,Arial,sans-serif"
    font-size="158" font-weight="900" font-style="italic"
    fill="rgba(34,229,92,0.25)" text-anchor="middle" letter-spacing="-4">NFT</text>
  <!-- NFT text main -->
  <text x="255" y="275"
    font-family="'Arial Black',Impact,Arial,sans-serif"
    font-size="158" font-weight="900" font-style="italic"
    fill="#22E55C" text-anchor="middle" letter-spacing="-4">NFT</text>
  <!-- TELECOM -->
  <text x="256" y="330"
    font-family="Arial,'Helvetica Neue',sans-serif"
    font-size="42" font-weight="700"
    fill="#FFFFFF" text-anchor="middle" letter-spacing="10">TELECOM</text>
</svg>
